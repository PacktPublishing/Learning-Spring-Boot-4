services:

  # ── pgvector — PostgreSQL 17 with the pgvector extension (production vector store) ──
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: ch14-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Chroma — lightweight vector DB for local development ─────────────────────────────
  chroma:
    image: ghcr.io/chroma-core/chroma:1.0.0
    container_name: ch14-chroma
    ports:
      - "8000:8000"
