spring.application.name=chapter-14-demo

# Force servlet stack when both spring-boot-starter-webmvc and webflux are on the classpath
spring.main.web-application-type=servlet

# ── OpenAI (active by default) ─────────────────────────────────────────────────
# Set your key before running: export OPENAI_API_KEY=sk-...
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

# ── Anthropic Claude (optional) ────────────────────────────────────────────────
# 1. Uncomment spring-ai-starter-model-anthropic in pom.xml
# 2. Set ANTHROPIC_API_KEY env var
# 3. Uncomment below:
#spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
#spring.ai.anthropic.chat.options.model=claude-opus-4-5
#spring.ai.anthropic.chat.options.max-tokens=1024

# ── Ollama — local inference (optional) ────────────────────────────────────────
# 1. Uncomment spring-ai-starter-model-ollama in pom.xml
# 2. Run: ollama serve && ollama pull llama3.2
# 3. Uncomment below:
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.options.model=llama3.2
#spring.ai.ollama.chat.options.temperature=0.7

# ── Heading 3: pgvector — production vector store ──────────────────────────────
# Requires Docker: run `docker compose up -d` from the project root first.
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536

# ── Heading 3: Chroma — local dev vector store (optional) ──────────────────────
# To use Chroma instead of pgvector:
#   1. Comment out pgvector dependencies and properties above.
#   2. Uncomment spring-ai-starter-vector-store-chroma in pom.xml.
#   3. Uncomment below (Chroma container starts via docker compose):
#spring.ai.vectorstore.chroma.client.host=localhost
#spring.ai.vectorstore.chroma.client.port=8000
#spring.ai.vectorstore.chroma.collection-name=chapter14
#spring.ai.vectorstore.chroma.initialize-schema=true

# ── Heading 3: Advisor logging (enable to see RAG requests/responses) ───────────
#logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# ── Heading 4: MCP Server ──────────────────────────────────────────────────────
# The spring-ai-starter-mcp-server-webmvc starter adds a Streamable-HTTP MCP
# endpoint at /mcp. All @Tool-annotated @Component beans are auto-discovered
# and exposed as MCP tools on startup.
spring.ai.mcp.server.name=chapter-14-techstore-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE

# ── Heading 4: MCP Client (optional) ───────────────────────────────────────────
# Activate with: --spring.profiles.active=mcp-client
# Also uncomment spring-ai-starter-mcp-client in pom.xml first.
#
# Option A — STDIO transport: launches an external process as the MCP server.
# Requires Node.js: npm install -g @modelcontextprotocol/server-filesystem
#spring.ai.mcp.client.enabled=true
#spring.ai.mcp.client.type=SYNC
#spring.ai.mcp.client.toolcallback.enabled=true
#spring.ai.mcp.client.stdio.connections.filesystem.command=npx
#spring.ai.mcp.client.stdio.connections.filesystem.args[0]=-y
#spring.ai.mcp.client.stdio.connections.filesystem.args[1]=@modelcontextprotocol/server-filesystem
#spring.ai.mcp.client.stdio.connections.filesystem.args[2]=/tmp
#
# Option B — Streamable-HTTP transport: connects to a running MCP server over HTTP.
# Point this at another Spring AI MCP server or any MCP-compatible server.
#spring.ai.mcp.client.enabled=true
#spring.ai.mcp.client.type=SYNC
#spring.ai.mcp.client.toolcallback.enabled=true
#spring.ai.mcp.client.streamable-http.connections.techstore.url=http://localhost:8080
#spring.ai.mcp.client.streamable-http.connections.techstore.endpoint=/mcp

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
