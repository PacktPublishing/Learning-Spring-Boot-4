spring.application.name=ch14

# Force servlet stack when both spring-boot-starter-webmvc and webflux are on the classpath
#spring.main.web-application-type=servlet

# OpenAI (active by default)
# Set your key before running: export OPENAI_API_KEY=sk-...
spring.ai.openai.api-key= ${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.openai.embedding.options.model=text-embedding-3-small
spring.ai.vectorstore.pgvector.dimensions=1536

# MCP SERVER
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=SSE
spring.ai.mcp.server.annotation-scanner.enabled=true



# Anthropic Claude (optional)
# 1. Uncomment spring-ai-starter-model-anthropic in pom.xml
# 2. Set ANTHROPIC_API_KEY env var
# 3. Uncomment below:
#spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
#spring.ai.anthropic.chat.options.model=claude-opus-4-5
#spring.ai.anthropic.chat.options.max-tokens=1024

# Ollama local inference (optional)
# 1. Uncomment spring-ai-starter-model-ollama in pom.xml
# 2. Run: ollama serve && ollama pull llama3.2
# 3. Uncomment below:
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.options.model=llama3.2
#spring.ai.ollama.chat.options.temperature=0.7

