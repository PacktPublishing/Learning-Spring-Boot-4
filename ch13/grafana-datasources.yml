apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceid":"([A-Fa-f0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      timeInterval: 5s
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: traceID
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -2m
        spanEndTimeShift: 2m
        tags:
          - key: service.name
            value: service_name
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{$${__tags}} | json | traceid="$${__trace.traceId}"'
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -2m
        spanEndTimeShift: 2m
        tags:
          - key: service.name
            value: exported_job
        queries:
          - name: Employee creations
            query: 'sum by (role) (increase(employee_created_count_total{$${__tags}}[5m]))'
          - name: Employee creation latency
            query: 'sum(rate(employee_create_time_milliseconds_sum{$${__tags}}[5m])) / clamp_min(sum(rate(employee_create_time_milliseconds_count{$${__tags}}[5m])), 1)'
          - name: Notification outcomes
            query: 'sum by (outcome) (increase(employee_notification_count_total{$${__tags}}[5m]))'
